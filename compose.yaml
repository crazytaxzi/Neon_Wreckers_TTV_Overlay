name: neon-wreckers

x-app: &app
  build:
    context: .
    target: app
  image: neon-wreckers-app:${IMAGE_TAG:-2.0.0}
  env_file: .env
  networks: [internal]

services:
  postgres:
    image: postgres:16.10-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [internal]

  redis:
    image: redis:7.4.5-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD}' ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - redis-data:/data
    networks: [internal]

  setup:
    <<: *app
    restart: "no"
    command: ["sh", "-c", "npm run db:migrate && npm run db:seed:production"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app
    restart: unless-stopped
    command: ["node", "apps/api/dist/server.js"]
    expose: ["8787"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    <<: *app
    restart: unless-stopped
    command: ["node", "apps/worker/dist/index.js"]
    depends_on:
      setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      target: gateway
    image: neon-wreckers-gateway:${IMAGE_TAG:-2.0.0}
    restart: unless-stopped
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
      NGINX_ENVSUBST_FILTER: PUBLIC_HOST
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O - https://127.0.0.1/health | grep -q '\"ok\":true'"]
      interval: 15s
      timeout: 5s
      retries: 12
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
