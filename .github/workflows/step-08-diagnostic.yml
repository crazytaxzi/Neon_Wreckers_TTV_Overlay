name: Step 8 diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'audit/08-overlay-decomposition'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Enable pnpm 10.32.0
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
      - name: Set up Node.js 22.16.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          pnpm --filter @neon-wreckers/overlay build > overlay-build.log 2>&1
          build_status=$?
          pnpm run test:repository > repository-test.log 2>&1
          repository_status=$?
          echo "$build_status" > overlay-build.status
          echo "$repository_status" > repository-test.status
          exit 0
      - name: Upload diagnostic output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: step-08-diagnostics
          path: |
            overlay-build.log
            overlay-build.status
            repository-test.log
            repository-test.status
          if-no-files-found: error
