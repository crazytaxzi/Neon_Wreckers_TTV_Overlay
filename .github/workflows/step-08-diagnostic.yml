name: Step 8 diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'audit/08-overlay-decomposition'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        command:
          - pnpm --filter @neon-wreckers/overlay build
          - pnpm run test:repository
          - pnpm exec tsx --test tools/test/overlay-bounded-id-cache.test.ts tools/test/overlay-headlines.test.ts
          - node --test tools/test/overlay-decomposition.test.mjs tools/test/ui-revamp.test.mjs
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Enable pnpm 10.32.0
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
      - name: Set up Node.js 22.16.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Run diagnostic command
        run: ${{ matrix.command }}
