name: Step 12 documentation patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'audit/12-docs-license-consistency'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: audit/12-docs-license-consistency
          persist-credentials: true
      - name: Apply documentation consistency changes
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text()
          old = '''## License and distribution

This repository is private and does not include an open-source license.

Unless the project owner publishes separate terms, the source code, artwork, content, branding, and deployment materials are proprietary and may not be redistributed or reused outside the authorized Neon Wreckers project.'''
          new = '''## License and distribution

This repository is publicly visible on GitHub. Public visibility is not a software license and does not grant permission to copy, modify, redistribute, sublicense, or commercially use the source code, artwork, content, branding, or deployment materials.

No open-source license is currently present. Third-party reuse must be treated as unauthorized unless the project owner publishes explicit terms. The owner must deliberately choose either an open-source license or a proprietary distribution notice before broader reuse rights are granted. See [LICENSE_STATUS.md](LICENSE_STATUS.md).'''
          if old not in text:
              raise SystemExit('README license section did not match expected source')
          text = text.replace(old, new, 1)
          text = text.replace('| [Test Report](docs/TEST_REPORT.md) | Automated verification results |', '| [Test Report](docs/TEST_REPORT.md) | Historical and current source-level verification evidence |')
          text = text.replace('| [Deployment Verification](docs/DEPLOYMENT_VERIFICATION.md) | Environment-dependent release evidence |', '| [Deployment Verification](docs/DEPLOYMENT_VERIFICATION.md) | Historical deployment-evidence boundary and target-host requirements |\n| [Verification Boundaries](docs/VERIFICATION_BOUNDARIES.md) | Defines source, deployment, and external-integration evidence |\n| [Release Evidence Template](docs/RELEASE_EVIDENCE_TEMPLATE.md) | Required evidence record for releases and deployments |\n| [Security Policy](SECURITY.md) | Private reporting, credential rotation, and incident response |')
          text = text.replace('For security-sensitive reports, use a private channel rather than a public issue.', 'For security-sensitive reports, follow [SECURITY.md](SECURITY.md) and use a private channel rather than a public issue. The credential-rotation checklist there is mandatory before deploying any environment derived from an earlier source package.')
          readme.write_text(text)

          test_report = Path('docs/TEST_REPORT.md')
          text = test_report.read_text()
          text = text.replace('# Test report\n\nVerification date: 2026-07-13.', '# Test report\n\n> Historical evidence snapshot. This document records checks performed on 2026-07-13 and must not be read as proof for the current commit or a later deployment. Current releases require a new record based on `docs/RELEASE_EVIDENCE_TEMPLATE.md`.\n\nVerification date: 2026-07-13.')
          test_report.write_text(text)

          deployment = Path('docs/DEPLOYMENT_VERIFICATION.md')
          text = deployment.read_text()
          text = text.replace('# Deployment verification\n\nVerification date: 2026-07-13.', '# Deployment verification\n\n> Historical evidence snapshot. This document records the 2026-07-13 archive review and is not evidence that the current commit was deployed or that external integrations succeeded. Record each release using `docs/RELEASE_EVIDENCE_TEMPLATE.md`.\n\nVerification date: 2026-07-13.')
          deployment.write_text(text)
          PY

          cat > LICENSE_STATUS.md <<'EOF'
          # License status

          This repository is publicly visible, but it does not currently contain an open-source license or another grant of reuse rights.

          Public access to source code is not permission to copy, modify, redistribute, sublicense, sell, or reuse the code, artwork, content, branding, or deployment materials. No such rights are granted by this file.

          The repository owner has not yet recorded the intended long-term distribution model. Final remediation requires an explicit owner decision between:

          1. publishing a selected open-source license with any required asset or trademark exceptions, or
          2. publishing explicit proprietary or all-rights-reserved distribution terms.

          Until that decision is made and committed, third-party reuse should be treated as unauthorized. This status file describes the current absence of a license; it is not itself a license.
          EOF

          cat > SECURITY.md <<'EOF'
          # Security policy

          ## Reporting a vulnerability

          Do not post credentials, exploit details, private logs, database contents, backups, certificates, or user data in a public issue. Contact the repository owner through a private channel and include the affected commit, component, reproduction steps, impact, and any temporary mitigation.

          ## Historical credential incident

          Source packages imported before Version 2.0 reportedly contained committed environment files with live-looking credentials. Treat every value from those packages as compromised even when it appears inactive. Removing a file from the current tree does not revoke a credential or erase it from history.

          ## Required rotation checklist

          Before any production deployment derived from an earlier package:

          - rotate PostgreSQL users and passwords
          - rotate Redis credentials
          - replace session and cookie signing secrets
          - rotate Twitch client secrets and review callback URLs
          - rotate StreamElements JWTs or provider credentials
          - replace TLS private keys or certificates if they were ever included
          - rotate deployment, SSH, registry, webhook, CI, and backup credentials that may have been exposed
          - invalidate active sessions and provider tokens where supported
          - search Git history, release archives, backups, logs, support bundles, and VM home directories for retained copies
          - confirm old credentials fail before declaring rotation complete
          - record who rotated each credential, when it was rotated, and the evidence location without recording the secret itself

          ## Evidence boundaries

          Passing repository tests proves only the source-level checks named by that run. It does not prove successful Twitch OAuth completion, StreamElements transactions, public TLS issuance, DNS routing, production container health, OBS Browser Source behavior, or a deployed WebSocket path. Those claims require dated target-environment evidence using `docs/RELEASE_EVIDENCE_TEMPLATE.md`.

          ## Sensitive artifacts

          Backups, `.env` files, database dumps, TLS material, generated credentials, provider tokens, and support bundles must never be committed. Store backups encrypted with restricted access and a documented retention policy.
          EOF

          cat > docs/VERIFICATION_BOUNDARIES.md <<'EOF'
          # Verification boundaries

          Verification claims are divided into three evidence classes.

          ## Source-level verification

          Source-level evidence is produced against an exact commit SHA. It can include frozen dependency installation, linting, type checking, unit and integration tests, browser tests with deterministic fixtures, content validation, Compose parsing, image builds, and static security scanning. It proves only the commands and assertions recorded by the run.

          ## Deployment verification

          Deployment evidence is produced on a named target environment and records the deployed commit, Compose configuration, migration result, service health, dependency readiness, gateway routing, TLS behavior, backup and restore checks, and rollback readiness. A successful source build is not proof that a deployment succeeded.

          ## External-integration verification

          Twitch OAuth, StreamElements operations, public DNS, public certificate issuance, OBS Browser Source rendering, and production WebSocket delivery require real configured services. Simulated or intercepted browser traffic must not be described as successful external integration verification.

          ## Evidence freshness

          Every evidence record must contain a date, exact commit SHA, environment identifier, commands, results, failures or waivers, and artifact locations. Old reports remain historical records and do not automatically apply to later commits.
          EOF

          cat > docs/RELEASE_EVIDENCE_TEMPLATE.md <<'EOF'
          # Release evidence

          ## Identification

          - Release or deployment name:
          - Date and UTC time:
          - Commit SHA:
          - Git tag, if any:
          - Operator:
          - Environment identifier:
          - Host or cluster description:

          ## Source-level verification

          | Command or workflow | Result | Run or artifact reference | Notes |
          | --- | --- | --- | --- |
          | `pnpm install --frozen-lockfile` | pending | | |
          | `pnpm verify` | pending | | |
          | CI and security gates | pending | | |
          | CodeQL and secret scan | pending | | |
          | Browser and visual tests | pending | | |
          | Compose validation and image builds | pending | | |

          ## Database and deployment

          - Migration command and result:
          - Seed command and result:
          - Deployed image identifiers or digests:
          - Service health results:
          - PostgreSQL readiness result:
          - Redis readiness result:
          - Gateway and WebSocket routing result:
          - Backup created and verified:
          - Restore rehearsal reference:
          - Rollback procedure reviewed:

          ## External integrations

          Record only tests performed with real configured services. Use `not tested` rather than simulated success.

          | Integration | Result | Evidence | Limitations |
          | --- | --- | --- | --- |
          | Twitch OAuth start and callback | not tested | | |
          | StreamElements debit, failure, and compensation | not tested | | |
          | Public DNS and TLS | not tested | | |
          | Production WebSocket delivery | not tested | | |
          | OBS Browser Source transparency and long-session behavior | not tested | | |

          ## Security and release decision

          - Historical credential rotation checklist completed:
          - Secret scan reviewed:
          - Known vulnerabilities or accepted risks:
          - Licensing and distribution posture reviewed:
          - Final go or no-go decision:
          - Approver:
          EOF

          cat > tools/test/docs-consistency.test.mjs <<'EOF'
          import assert from 'node:assert/strict';
          import fs from 'node:fs';
          import test from 'node:test';

          const read = file => fs.readFileSync(file, 'utf8');

          test('public visibility and license status are described without inventing reuse rights', () => {
            const readme = read('README.md');
            const status = read('LICENSE_STATUS.md');
            assert.doesNotMatch(readme, /This repository is private/i);
            assert.match(readme, /publicly visible on GitHub/i);
            assert.match(readme, /Public visibility is not a software license/i);
            assert.match(status, /does not currently contain an open-source license/i);
            assert.match(status, /not itself a license/i);
          });

          test('historical reports cannot masquerade as current release evidence', () => {
            for (const file of ['docs/TEST_REPORT.md', 'docs/DEPLOYMENT_VERIFICATION.md']) {
              const source = read(file);
              assert.match(source, /Historical evidence snapshot/);
              assert.match(source, /RELEASE_EVIDENCE_TEMPLATE\.md/);
            }
          });

          test('security and release evidence documents cover required boundaries', () => {
            const security = read('SECURITY.md');
            const boundaries = read('docs/VERIFICATION_BOUNDARIES.md');
            const template = read('docs/RELEASE_EVIDENCE_TEMPLATE.md');
            for (const credential of ['PostgreSQL', 'Redis', 'session', 'Twitch', 'StreamElements', 'TLS']) assert.match(security, new RegExp(credential, 'i'));
            for (const boundary of ['Source-level verification', 'Deployment verification', 'External-integration verification']) assert.match(boundaries, new RegExp(boundary));
            for (const field of ['Commit SHA', 'Environment identifier', 'Final go or no-go decision']) assert.match(template, new RegExp(field));
          });
          EOF

          git rm .github/workflows/step12-docs-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md LICENSE_STATUS.md SECURITY.md docs/TEST_REPORT.md docs/DEPLOYMENT_VERIFICATION.md docs/VERIFICATION_BOUNDARIES.md docs/RELEASE_EVIDENCE_TEMPLATE.md tools/test/docs-consistency.test.mjs
          git commit -m "docs(release): align visibility security and evidence claims"
          git push origin HEAD:audit/12-docs-license-consistency
