name: UI Visual Proof

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'apps/overlay/**'
      - 'packages/ui/**'
      - 'tools/test/ui-revamp.test.mjs'
      - '.github/workflows/ui-visual-proof.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Build synchronized browser surfaces
        env:
          VITE_VISUAL_PREVIEW: '1'
        run: |
          pnpm --filter @neon-wreckers/ui run build
          pnpm --filter @neon-wreckers/web run build
          pnpm --filter @neon-wreckers/admin run build
          pnpm --filter @neon-wreckers/overlay run build

      - name: Inject deterministic admin and overlay preview data
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const { join } = require('node:path');

          const adminRoot = 'apps/admin/dist';
          const adminIndexPath = join(adminRoot, 'index.html');
          const adminIndex = readFileSync(adminIndexPath, 'utf8');
          const adminFixture = String.raw`<script>
          (() => {
            const responses = {
              '/api/v1/me': { id: 'admin-preview', displayName: 'WRECKER CONTROL', avatarUrl: null, roles: ['admin', 'streamer'] },
              '/api/v1/station': { name: 'NEON PRIME HUB', population: 1248, power: 78, integrity: 92 },
              '/api/v1/integrations/streamelements/health': { ok: true, detail: 'Signed loyalty bridge online. Last settlement 18 seconds ago.' },
              '/api/v1/admin/config': [
                { id: 'cfg-4', slug: 'station-zero-live', version: 14, lifecycle: 'published', createdAt: '2026-07-21T21:10:00Z' },
                { id: 'cfg-3', slug: 'salvage-balance', version: 8, lifecycle: 'draft', createdAt: '2026-07-21T19:05:00Z' }
              ],
              '/api/v1/admin/overview': {
                service: { uptimeSeconds: 182440, startedAt: '2026-07-19T18:00:00Z', node: 'neon-wreckers-prod', loadAverage: [0.42, 0.58, 0.63], cpuCount: 4, memory: { rss: 348127232, heapUsed: 128040960, heapTotal: 187695104 }, disk: { total: 85899345920, free: 53687091200, used: 32212254720 }, sockets: 43 },
                throughput: { lastMinute: { requests: 184, errors: 1, bytes: 2488800, averageLatencyMs: 42, requestsPerMinute: 184 }, lastHour: { requests: 8620, errors: 12, bytes: 115500000, averageLatencyMs: 48, requestsPerMinute: 143 }, lastDay: { requests: 121400, errors: 97, bytes: 1489000000, averageLatencyMs: 51, requestsPerMinute: 84 }, series: [{ minute: '21:10', requests: 161, errors: 0, bytes: 2200000, latencyMs: 39 }, { minute: '21:11', requests: 184, errors: 1, bytes: 2488800, latencyMs: 42 }] },
                database: { players: 2847, activeExpeditions: 18, activeEvents: 2, activeCooldowns: 146, pendingTransactions: 3 },
                queue: { eventDispatch: 2, loyaltySettlement: 1, notifications: 7 },
                timers: [
                  { id: 'tm-1', name: 'Titan Interceptor expedition', playerName: 'WRECKER_77', resolvesAt: '2026-07-21T23:42:18Z' },
                  { id: 'tm-2', name: 'Refinery Complex upgrade', playerName: 'NOVA_9', resolvesAt: '2026-07-22T01:08:44Z' }
                ],
                cloudSafeZone: { machine: 'e2-standard-4', eligibleRegions: ['us-west1', 'us-central1'], vmHoursPerMonth: '730', standardDiskGbMonth: 80, outboundGbMonth: 20, estimatedOverage: { vmUsdPerHour: 0.134, standardDiskUsdPerGbMonth: 0.04, premiumEgressUsdPerGbFrom: 0.12 }, disclaimer: 'Estimate only. Billing remains provider authoritative.' }
              },
              '/api/v1/admin/players': [
                { id: 'p1', displayName: 'WRECKER_77', twitchLogin: 'wrecker77', credits: 8450, xp: 12840, level: 47, reputation: 2890, bannedUntil: null, cooldowns: [{ id: 'cd1', actionKey: 'salvage.scan', expiresAt: '2026-07-21T22:38:44Z' }] },
                { id: 'p2', displayName: 'NOVA_9', twitchLogin: 'nova9', credits: 5220, xp: 9400, level: 31, reputation: 1880, bannedUntil: null, cooldowns: [] },
                { id: 'p3', displayName: 'RUSTEDLEGEND', twitchLogin: 'rustedlegend', credits: 13820, xp: 20110, level: 62, reputation: 4210, bannedUntil: null, cooldowns: [{ id: 'cd2', actionKey: 'expedition.launch', expiresAt: '2026-07-22T00:04:00Z' }] },
                { id: 'p4', displayName: 'VOIDCUTTER', twitchLogin: 'voidcutter', credits: 940, xp: 3100, level: 14, reputation: 620, bannedUntil: '2026-07-22T05:00:00Z', cooldowns: [] }
              ],
              '/api/v1/admin/transactions': [
                { id: 'tx1', amount: 1250, actionSlug: 'market.purchase', status: 'settled', createdAt: '2026-07-21T22:12:00Z', error: null, user: { displayName: 'WRECKER_77', twitchLogin: 'wrecker77' } },
                { id: 'tx2', amount: 500, actionSlug: 'salvage.boost', status: 'pending', createdAt: '2026-07-21T22:14:00Z', error: null, user: { displayName: 'NOVA_9', twitchLogin: 'nova9' } },
                { id: 'tx3', amount: 2400, actionSlug: 'auction.bid', status: 'failed', createdAt: '2026-07-21T22:15:00Z', error: 'Loyalty provider timeout', user: { displayName: 'VOIDCUTTER', twitchLogin: 'voidcutter' } }
              ]
            };
            const nativeFetch = window.fetch.bind(window);
            window.fetch = async (input, init) => {
              const url = new URL(typeof input === 'string' ? input : input.url, location.origin);
              if (Object.prototype.hasOwnProperty.call(responses, url.pathname)) {
                return new Response(JSON.stringify(responses[url.pathname]), { status: 200, headers: { 'Content-Type': 'application/json' } });
              }
              return nativeFetch(input, init);
            };
          })();
          </script>`;
          const injectedAdmin = adminIndex.replace('<head>', `<head>${adminFixture}`);
          writeFileSync(adminIndexPath, injectedAdmin);
          const tabs = {
            operations: 'Operations', server: 'Server', timers: 'Timers', players: 'Players',
            transactions: 'Refunds', config: 'Config', interface: 'UI Library'
          };
          for (const [file, label] of Object.entries(tabs)) {
            const click = `<script>setTimeout(() => { const target = [...document.querySelectorAll('button')].find(button => button.textContent.trim().includes(${JSON.stringify(label)})); target?.click(); }, 900);</script>`;
            writeFileSync(join(adminRoot, `${file}.html`), injectedAdmin.replace('</body>', `${click}</body>`));
          }

          const overlayRoot = 'apps/overlay/dist';
          const overlayIndexPath = join(overlayRoot, 'index.html');
          const overlayIndex = readFileSync(overlayIndexPath, 'utf8');
          const overlayFixture = String.raw`<script>
          (() => {
            const responses = {
              '/overlay/overlay-config.json': {
                status: { top: 34, left: 34, width: 470, scale: 1, visible: true },
                ticker: { top: 34, width: 1400, scale: 1, rotationSeconds: 20, visible: true },
                feedIndicator: true, scanlines: true, glass: true, breakingNews: true, previewBackground: true,
                visibility: { tickerHoldSeconds: 120, statusHoldSeconds: 120, fadeSeconds: 0.3, keepVisibleInPreview: true }
              },
              '/api/v1/station': { name: 'NEON PRIME HUB', level: 4, population: 1248, power: 78, morale: 86, integrity: 92, threatLevel: 'ELEVATED', storageCapacity: 24000, storageUsed: 15240, resources: { scrap: 112600, credits: 8450 }, alerts: [{ id: 'alert-1', severity: 'critical', title: 'Reactor breach detected', body: 'Containment crews responding. Salvage operations remain active.', createdAt: '2026-07-21T22:20:00Z' }] },
              '/api/v1/history': [
                { id: 'h1', category: 'critical', title: 'High impact event', body: 'Reactor containment is unstable. Stay alert. Stay wrecking.', createdAt: '2026-07-21T22:20:00Z' },
                { id: 'h2', category: 'viewer', title: 'Raid incoming', body: 'The crew just got bigger. Viewer network linked.', createdAt: '2026-07-21T22:18:00Z' }
              ],
              '/api/v1/wrecks/current': { id: 'dread-frigate-009', name: 'DREAD FRIGATE', risk: 'EXTREME', integrity: 23, description: 'Unknown capital-class hull. Defensive systems and reactor instability detected.' }
            };
            const nativeFetch = window.fetch.bind(window);
            window.fetch = async (input, init) => {
              const url = new URL(typeof input === 'string' ? input : input.url, location.origin);
              if (Object.prototype.hasOwnProperty.call(responses, url.pathname)) {
                return new Response(JSON.stringify(responses[url.pathname]), { status: 200, headers: { 'Content-Type': 'application/json' } });
              }
              return nativeFetch(input, init);
            };
            window.WebSocket = class PreviewSocket {
              constructor() { this.readyState = 1; setTimeout(() => this.onopen?.({}), 100); }
              close() { this.readyState = 3; this.onclose?.({}); }
              send() {}
            };
          })();
          </script>`;
          writeFileSync(overlayIndexPath, overlayIndex.replace('<head>', `<head>${overlayFixture}`));
          NODE

      - name: Install Chromium
        run: pnpm dlx playwright@1.55.0 install --with-deps chromium

      - name: Start built previews
        run: |
          nohup pnpm --filter @neon-wreckers/web exec vite preview --host 127.0.0.1 --port 4173 > /tmp/neon-web-preview.log 2>&1 &
          nohup pnpm --filter @neon-wreckers/admin exec vite preview --host 127.0.0.1 --port 4174 > /tmp/neon-admin-preview.log 2>&1 &
          nohup pnpm --filter @neon-wreckers/overlay exec vite preview --host 127.0.0.1 --port 4175 > /tmp/neon-overlay-preview.log 2>&1 &
          for url in http://127.0.0.1:4173/ http://127.0.0.1:4174/admin/ http://127.0.0.1:4175/overlay/?preview=1; do
            ready=0
            for attempt in $(seq 1 30); do
              if curl --fail --silent "$url" >/dev/null; then ready=1; break; fi
              sleep 1
            done
            if [ "$ready" -ne 1 ]; then
              cat /tmp/neon-*-preview.log
              exit 1
            fi
          done

      - name: Capture every player destination
        run: |
          mkdir -p ui-visual-proof/player/mobile ui-visual-proof/player/tablet ui-visual-proof/player/desktop ui-visual-proof/player/audit
          views="station salvage construction inventory crafting market crew ships expeditions museum history notifications quarters profile settings guide"
          for view in $views; do
            name="$view"; if [ "$view" = "station" ]; then name="home"; fi
            pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "390,844" --wait-for-timeout 1200 "http://127.0.0.1:4173/?view=$view" "ui-visual-proof/player/mobile/$name.png"
            pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1920,1080" --wait-for-timeout 1200 "http://127.0.0.1:4173/?view=$view" "ui-visual-proof/player/desktop/$name.png"
          done
          for view in station salvage construction market profile; do
            name="$view"; if [ "$view" = "station" ]; then name="home"; fi
            pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1024,768" --wait-for-timeout 1200 "http://127.0.0.1:4173/?view=$view" "ui-visual-proof/player/tablet/$name.png"
          done
          for view in station salvage market; do
            name="$view"; if [ "$view" = "station" ]; then name="home"; fi
            pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "390,844" --full-page --wait-for-timeout 1200 "http://127.0.0.1:4173/?view=$view" "ui-visual-proof/player/audit/mobile-$name-full.png"
          done

      - name: Capture admin operations surfaces
        run: |
          mkdir -p ui-visual-proof/admin/desktop ui-visual-proof/admin/tablet ui-visual-proof/admin/mobile
          views="operations server timers players transactions config interface"
          for view in $views; do
            pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1920,1080" --wait-for-timeout 1800 "http://127.0.0.1:4174/admin/$view.html" "ui-visual-proof/admin/desktop/$view.png"
          done
          for view in operations players config; do
            pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1024,768" --wait-for-timeout 1800 "http://127.0.0.1:4174/admin/$view.html" "ui-visual-proof/admin/tablet/$view.png"
          done
          for view in operations players; do
            pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "390,844" --wait-for-timeout 1800 "http://127.0.0.1:4174/admin/$view.html" "ui-visual-proof/admin/mobile/$view.png"
          done

      - name: Capture OBS overlay canvases
        run: |
          mkdir -p ui-visual-proof/overlay
          pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1280,720" --wait-for-timeout 1600 "http://127.0.0.1:4175/overlay/?preview=1" "ui-visual-proof/overlay/720p.png"
          pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1920,1080" --wait-for-timeout 1600 "http://127.0.0.1:4175/overlay/?preview=1" "ui-visual-proof/overlay/1080p.png"
          pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "2560,1440" --wait-for-timeout 1600 "http://127.0.0.1:4175/overlay/?preview=1" "ui-visual-proof/overlay/1440p.png"
          pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "3840,2160" --wait-for-timeout 1600 "http://127.0.0.1:4175/overlay/?preview=1" "ui-visual-proof/overlay/4k.png"

      - name: Write visual-proof manifest
        run: |
          cat > ui-visual-proof/README.txt <<'MANIFEST'
          These PNGs are screenshots of the production-built React applications.
          Player captures cover every existing destination on mobile and desktop plus primary tablet destinations.
          Admin captures cover every operations destination on desktop, critical tablet views, and phone-safe operations.
          Overlay captures cover 720p, 1080p, 1440p, and 4K OBS canvases.
          Fixture interception exists only inside this CI workflow. Production continues to use live API and WebSocket data.
          MANIFEST

      - name: Upload visual proof
        uses: actions/upload-artifact@v4
        with:
          name: ui-visual-proof
          path: ui-visual-proof
          retention-days: 14

      - name: Upload preview diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-visual-proof-diagnostics
          path: /tmp/neon-*-preview.log
          retention-days: 14
