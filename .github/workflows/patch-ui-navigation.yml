name: Patch UI Navigation Source

on:
  push:
    branches:
      - ui/concept-driven-revamp

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/concept-driven-revamp

      - name: Use the destination identifier in mobile navigation markup
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('packages/ui/src/components.tsx')
          source = path.read_text()
          old = '''const mobileButton = (id: string, label: string, icon: IconName, active: boolean, action: () => void) => <button key={label} type="button" className={active ? 'is-active' : ''} onClick={action} aria-current={active ? 'page' : undefined}>'''
          new = '''const mobileButton = (id: string, label: string, icon: IconName, active: boolean, action: () => void) => <button key={label} type="button" data-destination={id} className={active ? 'is-active' : ''} onClick={action} aria-current={active ? 'page' : undefined}>'''
          if old not in source:
              print('Target source is already corrected; no patch required.')
              raise SystemExit(0)
          path.write_text(source.replace(old, new, 1))
          PY

      - name: Commit correction when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packages/ui/src/components.tsx
          git commit -m 'fix(ui): use mobile destination identifier'
          git push origin HEAD:ui/concept-driven-revamp
