name: Self-hosted verification

on:
  push:
    branches:
      - audit/runner-bootstrap
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: self-hosted-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.repository == 'crazytaxzi/Neon_Wreckers_TTV_Overlay'
    runs-on: [self-hosted, Linux, X64, neon-wreckers]
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Node.js 22.16.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Verify runner toolchain
        shell: bash
        run: |
          set -euo pipefail
          echo "Runner: $RUNNER_NAME"
          test "$(node --version)" = "v22.16.0"
          git --version
          mkdir -p /home/crazytaxzi/Neon_Wreckers_TTV_Overlay_Temp
          test -w /home/crazytaxzi/Neon_Wreckers_TTV_Overlay_Temp

      - name: Enable exact pnpm version
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
          test "$(pnpm --version)" = "10.32.0"

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Run repository verification
        shell: bash
        run: pnpm verify
