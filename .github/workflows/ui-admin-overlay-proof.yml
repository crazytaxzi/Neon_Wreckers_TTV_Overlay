name: Admin and Overlay Visual Proof

on:
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'apps/overlay/**'
      - 'packages/ui/**'
      - '.github/workflows/ui-admin-overlay-proof.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Apply guarded real-viewer popup source
        run: |
          python <<'PY'
          from pathlib import Path

          main = Path('apps/overlay/src/main.tsx')
          source = main.read_text()
          old_import = "import { Badge, Meter, NWIcon, Panel, ThemeProvider, defaultTheme, type Tone } from '@neon-wreckers/ui';"
          new_import = "import { Badge, Meter, NWIcon, OverlayEventPopup, Panel, ThemeProvider, defaultTheme, type Tone } from '@neon-wreckers/ui';"
          if old_import in source:
              source = source.replace(old_import, new_import, 1)
          elif new_import not in source:
              raise SystemExit('Expected overlay UI import was not found.')

          anchor = "      {config.ticker.visible && <section className={`dispatch-rail nw-tone--${uiTone(current.severity)} ${breaking ? 'breaking' : ''} ${showTicker ? 'overlay-awake' : 'overlay-idle'}`} aria-live=\"polite\">"
          popup = """      {current.severity === 'viewer' && showTicker && <div className=\"viewer-event-region\" key={`viewer-${current.id}-${transitionKey}`}>
        <OverlayEventPopup label={current.label} title={current.title} tone=\"purple\" icon=\"broadcast\">{current.body}</OverlayEventPopup>
      </div>}

"""
          if 'className="viewer-event-region"' not in source:
              if anchor not in source:
                  raise SystemExit('Expected ticker render anchor was not found.')
              source = source.replace(anchor, popup + anchor, 1)
          main.write_text(source)

          css = Path('apps/overlay/src/overlay-graphics.css')
          styles = css.read_text()
          addition = r'''

.viewer-event-region {
  position: absolute;
  top: clamp(8rem, 19vh, 15rem);
  left: 50%;
  z-index: 12;
  width: min(25rem, 34vw);
  pointer-events: none;
  transform: translateX(-50%);
  animation: viewer-event-arrive 420ms var(--nw-motion-easing) both;
}

.viewer-event-region .nw-overlay-event {
  position: relative;
  overflow: visible;
  min-height: 8.4rem;
  padding: 1.15rem 1.35rem;
  border: 1px solid rgba(var(--nw-color-purple-rgb), 0.78);
  border-inline-start: 4px solid var(--nw-color-green);
  color: var(--nw-color-text);
  background:
    radial-gradient(circle at 18% 50%, rgba(var(--nw-color-purple-rgb), 0.2), transparent 7rem),
    repeating-linear-gradient(135deg, transparent 0 12px, rgba(var(--nw-color-text-rgb), 0.018) 12px 13px),
    linear-gradient(180deg, rgba(var(--nw-color-surface-raised-rgb), 0.97), rgba(var(--nw-color-void-rgb), 0.97));
  box-shadow:
    inset 0 1px rgba(var(--nw-color-text-rgb), 0.11),
    inset 0 -0.4rem rgba(var(--nw-color-void-rgb), 0.42),
    0 0 0 1px rgba(var(--nw-color-void-rgb), 0.92),
    0 0 34px rgba(var(--nw-color-purple-rgb), 0.28),
    0 1.4rem 3.5rem rgba(var(--nw-color-void-rgb), 0.66);
  clip-path: polygon(1rem 0, calc(100% - 1rem) 0, 100% 1rem, 100% calc(100% - 1rem), calc(100% - 1rem) 100%, 1rem 100%, 0 calc(100% - 1rem), 0 1rem);
}

.viewer-event-region .nw-overlay-event::before {
  position: absolute;
  inset: -0.38rem;
  z-index: -1;
  content: "";
  border: 1px solid rgba(var(--nw-color-green-rgb), 0.24);
  background:
    linear-gradient(90deg, var(--nw-color-green) 0 5rem, transparent 5rem) top left / 100% 3px no-repeat,
    linear-gradient(90deg, transparent, var(--nw-color-purple)) bottom right / 48% 3px no-repeat;
  clip-path: inherit;
}

.viewer-event-region .nw-overlay-event::after {
  position: absolute;
  inset-block: 0.65rem;
  inset-inline-end: 0.48rem;
  width: 3px;
  content: "";
  background: repeating-linear-gradient(180deg, var(--nw-color-purple) 0 8px, transparent 8px 12px);
  box-shadow: 0 0 10px rgba(var(--nw-color-purple-rgb), 0.58);
}

.viewer-event-region .nw-overlay-event__icon {
  width: 4rem;
  height: 4rem;
  border: 1px solid rgba(var(--nw-color-purple-rgb), 0.6);
  color: var(--nw-color-green);
  background:
    radial-gradient(circle, rgba(var(--nw-color-purple-rgb), 0.28), transparent 64%),
    rgba(var(--nw-color-void-rgb), 0.72);
  box-shadow: inset 0 0 0 1px rgba(var(--nw-color-green-rgb), 0.12), 0 0 20px rgba(var(--nw-color-purple-rgb), 0.24);
}

.viewer-event-region .nw-overlay-event > div:last-child > span {
  color: var(--nw-color-green);
  font-family: var(--nw-font-mono);
  font-size: 0.58rem;
  font-weight: 850;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.viewer-event-region .nw-overlay-event strong {
  display: block;
  margin-top: 0.35rem;
  font-family: var(--nw-font-display);
  font-size: clamp(1.1rem, 1.25vw, 1.55rem);
  letter-spacing: 0.045em;
  text-transform: uppercase;
  text-shadow: 0 0 16px rgba(var(--nw-color-purple-rgb), 0.36);
}

.viewer-event-region .nw-overlay-event p {
  margin: 0.45rem 0 0;
  color: var(--nw-color-text-muted);
  font-size: 0.76rem;
  line-height: 1.4;
}

@keyframes viewer-event-arrive {
  from { opacity: 0; transform: translate(-50%, -1rem) scale(0.96); filter: blur(4px); }
  to { opacity: 1; transform: translate(-50%, 0) scale(1); filter: none; }
}

@media (max-width: 1600px), (max-height: 800px) {
  .viewer-event-region { top: 6.4rem; width: min(22rem, 38vw); }
  .viewer-event-region .nw-overlay-event { min-height: 7rem; padding: 0.9rem 1rem; }
  .viewer-event-region .nw-overlay-event__icon { width: 3.3rem; height: 3.3rem; }
}

@media (prefers-reduced-motion: reduce) {
  .viewer-event-region { animation: none; }
}

html[data-low-effects="true"] .viewer-event-region .nw-overlay-event {
  box-shadow: 0 0 0 1px rgba(var(--nw-color-purple-rgb), 0.34);
}

@media (forced-colors: active) {
  .viewer-event-region .nw-overlay-event { border: 2px solid CanvasText; background: Canvas; }
  .viewer-event-region .nw-overlay-event::before,
  .viewer-event-region .nw-overlay-event::after { display: none; }
}
'''
          if '.viewer-event-region {' not in styles:
              css.write_text(styles + addition)
          PY

      - run: pnpm install --frozen-lockfile
      - name: Build admin and overlay
        run: |
          pnpm --filter @neon-wreckers/ui run build
          pnpm --filter @neon-wreckers/admin run build
          pnpm --filter @neon-wreckers/overlay run build
          node --test tools/test/ui-graphics.test.mjs

      - name: Inject preview-only fixtures
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const { join } = require('node:path');

          function inject(path, script) {
            const html = readFileSync(path, 'utf8');
            writeFileSync(path, html.replace('<head>', `<head><script>${script}</script>`));
          }

          const adminData = {
            '/api/v1/me': { id: 'admin-preview', displayName: 'WRECKER CONTROL', avatarUrl: null, roles: ['admin', 'streamer'] },
            '/api/v1/station': { name: 'NEON PRIME HUB', population: 1248, power: 78, integrity: 92 },
            '/api/v1/integrations/streamelements/health': { ok: true, detail: 'Signed loyalty bridge online. Last settlement 18 seconds ago.' },
            '/api/v1/admin/config': [
              { id: 'cfg-4', slug: 'station-zero-live', version: 14, lifecycle: 'published', createdAt: '2026-07-21T21:10:00Z' },
              { id: 'cfg-3', slug: 'salvage-balance', version: 8, lifecycle: 'draft', createdAt: '2026-07-21T19:05:00Z' }
            ],
            '/api/v1/admin/overview': {
              service: { uptimeSeconds: 182440, startedAt: '2026-07-19T18:00:00Z', node: 'neon-wreckers-prod', loadAverage: [0.42, 0.58, 0.63], cpuCount: 4, memory: { rss: 348127232, heapUsed: 128040960, heapTotal: 187695104 }, disk: { total: 85899345920, free: 53687091200, used: 32212254720 }, sockets: 43 },
              throughput: { lastMinute: { requests: 184, errors: 1, bytes: 2488800, averageLatencyMs: 42, requestsPerMinute: 184 }, lastHour: { requests: 8620, errors: 12, bytes: 115500000, averageLatencyMs: 48, requestsPerMinute: 143 }, lastDay: { requests: 121400, errors: 97, bytes: 1489000000, averageLatencyMs: 51, requestsPerMinute: 84 }, series: [{ minute: '21:10', requests: 161, errors: 0, bytes: 2200000, latencyMs: 39 }, { minute: '21:11', requests: 184, errors: 1, bytes: 2488800, latencyMs: 42 }] },
              database: { players: 2847, activeExpeditions: 18, activeEvents: 2, activeCooldowns: 146, pendingTransactions: 3 },
              queue: { eventDispatch: 2, loyaltySettlement: 1, notifications: 7 },
              timers: [
                { id: 'tm-1', name: 'Titan Interceptor expedition', playerName: 'WRECKER_77', resolvesAt: '2026-07-21T23:42:18Z' },
                { id: 'tm-2', name: 'Refinery Complex upgrade', playerName: 'NOVA_9', resolvesAt: '2026-07-22T01:08:44Z' }
              ],
              cloudSafeZone: { machine: 'e2-standard-4', eligibleRegions: ['us-west1', 'us-central1'], vmHoursPerMonth: '730', standardDiskGbMonth: 80, outboundGbMonth: 20, estimatedOverage: { vmUsdPerHour: 0.134, standardDiskUsdPerGbMonth: 0.04, premiumEgressUsdPerGbFrom: 0.12 }, disclaimer: 'Estimate only. Billing remains provider authoritative.' }
            },
            '/api/v1/admin/players': [
              { id: 'p1', displayName: 'WRECKER_77', twitchLogin: 'wrecker77', credits: 8450, xp: 12840, level: 47, reputation: 2890, bannedUntil: null, cooldowns: [{ id: 'cd1', actionKey: 'salvage.scan', expiresAt: '2026-07-21T22:38:44Z' }] },
              { id: 'p2', displayName: 'NOVA_9', twitchLogin: 'nova9', credits: 5220, xp: 9400, level: 31, reputation: 1880, bannedUntil: null, cooldowns: [] },
              { id: 'p3', displayName: 'RUSTEDLEGEND', twitchLogin: 'rustedlegend', credits: 13820, xp: 20110, level: 62, reputation: 4210, bannedUntil: null, cooldowns: [{ id: 'cd2', actionKey: 'expedition.launch', expiresAt: '2026-07-22T00:04:00Z' }] },
              { id: 'p4', displayName: 'VOIDCUTTER', twitchLogin: 'voidcutter', credits: 940, xp: 3100, level: 14, reputation: 620, bannedUntil: '2026-07-22T05:00:00Z', cooldowns: [] }
            ],
            '/api/v1/admin/transactions': [
              { id: 'tx1', amount: 1250, actionSlug: 'market.purchase', status: 'settled', createdAt: '2026-07-21T22:12:00Z', error: null, user: { displayName: 'WRECKER_77', twitchLogin: 'wrecker77' } },
              { id: 'tx2', amount: 500, actionSlug: 'salvage.boost', status: 'pending', createdAt: '2026-07-21T22:14:00Z', error: null, user: { displayName: 'NOVA_9', twitchLogin: 'nova9' } },
              { id: 'tx3', amount: 2400, actionSlug: 'auction.bid', status: 'failed', createdAt: '2026-07-21T22:15:00Z', error: 'Loyalty provider timeout', user: { displayName: 'VOIDCUTTER', twitchLogin: 'voidcutter' } }
            ]
          };

          const adminScript = `(() => { const data = ${JSON.stringify(adminData)}; const style = document.createElement('style'); style.textContent = '.nw-skip-link{display:none!important}'; document.head.append(style); const nativeFetch = window.fetch.bind(window); window.fetch = async (input, init) => { const url = new URL(typeof input === 'string' ? input : input.url, location.origin); if (Object.prototype.hasOwnProperty.call(data, url.pathname)) return new Response(JSON.stringify({ data: data[url.pathname] }), { status: 200, headers: { 'Content-Type': 'application/json' } }); return nativeFetch(input, init); }; })();`;
          const adminRoot = 'apps/admin/dist';
          const adminIndexPath = join(adminRoot, 'index.html');
          inject(adminIndexPath, adminScript);
          const adminIndex = readFileSync(adminIndexPath, 'utf8');
          const tabs = { operations: 'Operations', server: 'Server', timers: 'Timers', players: 'Players', transactions: 'Refunds', config: 'Config', interface: 'UI Library' };
          for (const [file, label] of Object.entries(tabs)) {
            const click = `<script>setTimeout(() => [...document.querySelectorAll('button')].find(button => button.textContent.trim().includes(${JSON.stringify(label)}))?.click(), 1100);</script>`;
            writeFileSync(join(adminRoot, `${file}.html`), adminIndex.replace('</body>', `${click}</body>`));
          }
          const graphicsClick = `<script>setTimeout(() => [...document.querySelectorAll('button')].find(button => button.textContent.trim().includes('UI Library'))?.click(), 900);setTimeout(() => [...document.querySelectorAll('button')].find(button => button.textContent.trim().includes('Graphic Language'))?.click(), 1800);</script>`;
          writeFileSync(join(adminRoot, 'graphics.html'), adminIndex.replace('</body>', `${graphicsClick}</body>`));

          const overlayData = {
            '/api/v1/station': { name: 'NEON PRIME HUB', level: 4, population: 1248, power: 78, morale: 86, integrity: 92, threatLevel: 'ELEVATED', storageCapacity: 24000, storageUsed: 15240, resources: { scrap: 112600, credits: 8450 }, alerts: [{ id: 'alert-1', severity: 'critical', title: 'Reactor breach detected', body: 'Containment crews responding. Salvage operations remain active.', createdAt: '2026-07-21T22:20:00Z' }] },
            '/api/v1/history': [
              { id: 'h1', category: 'critical', title: 'High impact event', body: 'Reactor containment is unstable. Stay alert. Stay wrecking.', createdAt: '2026-07-21T22:20:00Z' },
              { id: 'h2', category: 'viewer', title: 'Raid incoming', body: 'The crew just got bigger. Viewer network linked.', createdAt: '2026-07-21T22:18:00Z' }
            ],
            '/api/v1/wrecks/current': { id: 'dread-frigate-009', name: 'DREAD FRIGATE', risk: 'EXTREME', integrity: 23, description: 'Unknown capital-class hull. Defensive systems and reactor instability detected.' }
          };
          const viewerHistory = [{ id: 'viewer-raid', category: 'viewer', title: 'Raid incoming', body: 'The crew just got bigger. Viewer network linked.', createdAt: '2026-07-21T22:30:00Z' }];
          const overlayConfig = { status: { top: 34, left: 34, width: 520, scale: 1, visible: true }, ticker: { top: 34, width: 1400, scale: 1, rotationSeconds: 20, visible: true }, feedIndicator: true, scanlines: true, glass: true, breakingNews: true, previewBackground: true, visibility: { tickerHoldSeconds: 120, statusHoldSeconds: 120, fadeSeconds: 0.3, keepVisibleInPreview: true } };
          const overlayScript = `(() => { const data = ${JSON.stringify(overlayData)}; const viewerHistory = ${JSON.stringify(viewerHistory)}; const config = ${JSON.stringify(overlayConfig)}; const viewerMode = new URLSearchParams(location.search).get('event') === 'viewer'; const nativeFetch = window.fetch.bind(window); window.fetch = async (input, init) => { const url = new URL(typeof input === 'string' ? input : input.url, location.origin); if (url.pathname === '/overlay/overlay-config.json') return new Response(JSON.stringify(config), { status: 200, headers: { 'Content-Type': 'application/json' } }); if (Object.prototype.hasOwnProperty.call(data, url.pathname)) { let payload = data[url.pathname]; if (viewerMode && url.pathname === '/api/v1/history') payload = viewerHistory; if (viewerMode && url.pathname === '/api/v1/station') payload = { ...payload, alerts: [] }; return new Response(JSON.stringify({ data: payload }), { status: 200, headers: { 'Content-Type': 'application/json' } }); } return nativeFetch(input, init); }; window.WebSocket = class PreviewSocket { constructor() { this.readyState = 1; setTimeout(() => this.onopen?.({}), 100); } close() { this.readyState = 3; } send() {} }; })();`;
          inject('apps/overlay/dist/index.html', overlayScript);
          NODE

      - name: Install Chromium
        run: pnpm dlx playwright@1.55.0 install --with-deps chromium
      - name: Start previews
        run: |
          nohup pnpm --filter @neon-wreckers/admin exec vite preview --host 127.0.0.1 --port 4174 > /tmp/admin.log 2>&1 &
          nohup pnpm --filter @neon-wreckers/overlay exec vite preview --host 127.0.0.1 --port 4175 > /tmp/overlay.log 2>&1 &
          for url in http://127.0.0.1:4174/admin/ http://127.0.0.1:4175/overlay/?preview=1; do
            for attempt in $(seq 1 30); do curl --fail --silent "$url" >/dev/null && break; sleep 1; done
          done

      - name: Capture admin
        run: |
          mkdir -p proof/admin/desktop proof/admin/tablet proof/admin/mobile
          for view in operations server timers players transactions config interface graphics; do
            pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1920,1080" --wait-for-timeout 2400 "http://127.0.0.1:4174/admin/$view.html" "proof/admin/desktop/$view.png"
          done
          for view in operations players config graphics; do
            pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1024,768" --wait-for-timeout 2400 "http://127.0.0.1:4174/admin/$view.html" "proof/admin/tablet/$view.png"
          done
          for view in operations players; do
            pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "390,844" --wait-for-timeout 2200 "http://127.0.0.1:4174/admin/$view.html" "proof/admin/mobile/$view.png"
          done

      - name: Capture overlay
        run: |
          mkdir -p proof/overlay
          pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1280,720" --wait-for-timeout 1800 "http://127.0.0.1:4175/overlay/?preview=1" "proof/overlay/720p.png"
          pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1920,1080" --wait-for-timeout 1800 "http://127.0.0.1:4175/overlay/?preview=1" "proof/overlay/1080p.png"
          pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "2560,1440" --wait-for-timeout 1800 "http://127.0.0.1:4175/overlay/?preview=1" "proof/overlay/1440p.png"
          pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "3840,2160" --wait-for-timeout 1800 "http://127.0.0.1:4175/overlay/?preview=1" "proof/overlay/4k.png"
          pnpm dlx playwright@1.55.0 screenshot --browser chromium --viewport-size "1920,1080" --wait-for-timeout 1800 "http://127.0.0.1:4175/overlay/?preview=1&event=viewer" "proof/overlay/viewer-event-1080p.png"

      - name: Commit verified viewer-popup source
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/overlay/src/main.tsx apps/overlay/src/overlay-graphics.css
          if ! git diff --cached --quiet; then
            git commit -m "feat(overlay): show real viewer event popups"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: admin-overlay-visual-proof
          path: proof
          retention-days: 14
