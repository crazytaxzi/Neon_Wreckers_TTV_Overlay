name: Step 3 workspace alignment

on:
  push:
    branches:
      - audit/03-shared-runtime-contracts

permissions:
  contents: write

jobs:
  align:
    if: github.repository == 'crazytaxzi/Neon_Wreckers_TTV_Overlay'
    runs-on: [self-hosted, Linux, X64, neon-wreckers]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: audit/03-shared-runtime-contracts
          fetch-depth: 0
      - name: Align workspace test and clean diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/test/repository.test.mjs')
          source = path.read_text()
          source = source.replace(
              "    '@neon-wreckers/content',\n    '@neon-wreckers/game-engine',",
              "    '@neon-wreckers/content',\n    '@neon-wreckers/contracts',\n    '@neon-wreckers/game-engine',"
          )
          source = source.replace(
              "'packages/client-theme', 'packages/content', 'packages/game-engine'",
              "'packages/client-theme', 'packages/content', 'packages/contracts', 'packages/game-engine'"
          )
          path.write_text(source)
          Path('docs/STEP3_VERIFY_DIAGNOSTIC.md').unlink(missing_ok=True)
          Path('.github/workflows/step3-workspace-alignment.yml').unlink()
          PY
          git config user.name 'neon-wreckers-audit-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add --all
          git diff --cached --check
          git commit -m 'test(repository): register shared contracts workspace'
          git push origin HEAD:audit/03-shared-runtime-contracts
