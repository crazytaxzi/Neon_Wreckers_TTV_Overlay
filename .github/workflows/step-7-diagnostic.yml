name: Step 7 diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'audit/07-observability'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        command:
          - "pnpm exec tsx --test tools/test/observability.test.ts"
          - "pnpm run test:repository"
          - "pnpm run build"
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Enable pnpm 10.32.0
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
      - name: Set up Node.js 22.16.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Run diagnostic command
        run: ${{ matrix.command }}
