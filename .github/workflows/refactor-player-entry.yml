name: Refactor Player Entry

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/refactor-player-entry.yml'

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/concept-driven-revamp
          fetch-depth: 2

      - name: Run reviewed behavior-preserving extraction
        run: |
          git show HEAD^:.github/workflows/refactor-player-entry.yml > /tmp/previous-refactor.yml
          python - <<'PY'
          from pathlib import Path

          source = Path('/tmp/previous-refactor.yml').read_text()
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end].splitlines())
          exec(compile(script, 'player-refactor.py', 'exec'))
          PY
          rm .github/workflows/refactor-player-entry.yml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate modular player source
        run: |
          node --test tools/test/ui-revamp.test.mjs
          pnpm --filter @neon-wreckers/web run build

      - name: Commit and push refactor
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/src tools/test/ui-revamp.test.mjs docs/UI_REVAMP_REPORT.md docs/UI_PERFORMANCE.md .github/workflows/refactor-player-entry.yml
          git commit -m 'refactor(web): split player feature modules'
          git push origin HEAD:ui/concept-driven-revamp
