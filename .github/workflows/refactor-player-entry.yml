name: Refactor Player Entry

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/refactor-player-entry.yml'

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/concept-driven-revamp
          fetch-depth: 0

      - name: Run reviewed behavior-preserving extraction
        run: |
          git show 49e80a0601d039779a8963a0e5e8b496f01722e8:.github/workflows/refactor-player-entry.yml > /tmp/reviewed-refactor.yml
          python - <<'PY'
          from pathlib import Path

          source = Path('/tmp/reviewed-refactor.yml').read_text()
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end].splitlines())
          exec(compile(script, 'player-refactor.py', 'exec'))

          fleet = Path('apps/web/src/pages/fleet.tsx')
          fleet.write_text(fleet.read_text().replace(
              "import type { ExpeditionDefinition, GameData, Ship } from '../model.js';",
              "import type { ExpeditionDefinition, GameData, Marketplace, Ship } from '../model.js';"
          ))
          community = Path('apps/web/src/pages/community.tsx')
          community.write_text(community.read_text().replace(
              'PlayerNotification, Quarters, UiPreferences',
              'PlayerNotification, Quarters, QuartersObject, UiPreferences'
          ))
          PY
          rm .github/workflows/refactor-player-entry.yml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate modular player source
        run: |
          set -o pipefail
          {
            node --test tools/test/ui-revamp.test.mjs
            pnpm --filter @neon-wreckers/web run build
          } 2>&1 | tee modular-validation.log

      - name: Upload modular validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: modular-player-validation
          path: modular-validation.log
          retention-days: 14

      - name: Commit and push refactor
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/src tools/test/ui-revamp.test.mjs docs/UI_REVAMP_REPORT.md docs/UI_PERFORMANCE.md .github/workflows/refactor-player-entry.yml
          git commit -m 'refactor(web): split player feature modules'
          git push origin HEAD:ui/concept-driven-revamp
