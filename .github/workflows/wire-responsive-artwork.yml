name: Wire Responsive Artwork

on:
  push:
    branches:
      - ui/concept-driven-revamp
    paths:
      - '.github/workflows/wire-responsive-artwork.yml'

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/concept-driven-revamp

      - name: Replace direct image tags with the responsive artwork component
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/web/src/main.tsx')
          source = path.read_text()
          replacements = [
              (
                  "} from '@neon-wreckers/ui';\nimport './styles.css';",
                  "} from '@neon-wreckers/ui';\nimport { GameArtwork } from './components/GameArtwork.js';\nimport './styles.css';"
              ),
              (
                  '<img className="station-orbit__art" src="/station/station-zero.webp" alt="Station Zero modular orbital station" />',
                  '<GameArtwork className="station-orbit__art" src="/station/station-zero.webp" alt="Station Zero modular orbital station" eager sizes="(max-width: 760px) 92vw, 46rem" />'
              ),
              (
                  '<img src={`/station/modules/${module.slug}.webp`} alt="" />',
                  '<GameArtwork src={`/station/modules/${module.slug}.webp`} alt="" sizes="(max-width: 760px) 88px, 112px" />'
              ),
              (
                  '<img src={`/wrecks/${wreck.archetype}.webp`} alt={`${wreck.name}, current salvage target`} />',
                  '<GameArtwork src={`/wrecks/${wreck.archetype}.webp`} alt={`${wreck.name}, current salvage target`} eager sizes="(max-width: 760px) 88vw, 34rem" />'
              ),
              (
                  '<img src={`/ships/skins/${ship.activeSkin}.webp`} alt={`${ship.name} premium frame`} />',
                  '<GameArtwork src={`/ships/skins/${ship.activeSkin}.webp`} alt={`${ship.name} premium frame`} sizes="(max-width: 760px) 88vw, 28rem" />'
              ),
              (
                  '<img src={`/ships/base/${ship.classSlug}.webp`} alt={`${ship.name} base frame`} />',
                  '<GameArtwork src={`/ships/base/${ship.classSlug}.webp`} alt={`${ship.name} base frame`} sizes="(max-width: 760px) 88vw, 28rem" />'
              ),
              (
                  '<img className="management-preview" src={`/ships/skins/${skin.slug}.webp`} alt={`${skin.name} preview`} />',
                  '<GameArtwork className="management-preview" src={`/ships/skins/${skin.slug}.webp`} alt={`${skin.name} preview`} sizes="(max-width: 760px) 88vw, 34rem" />'
              ),
              (
                  '<img src={`/ships/skins/${skin.slug}.webp`} alt={`${skin.name} premium ${skin.classSlug} skin`} />',
                  '<GameArtwork src={`/ships/skins/${skin.slug}.webp`} alt={`${skin.name} premium ${skin.classSlug} skin`} sizes="(max-width: 760px) 88vw, 30rem" />'
              )
          ]

          for old, new in replacements:
              if old in source:
                  source = source.replace(old, new)
              elif new not in source:
                  raise SystemExit(f'Expected source fragment was not found: {old[:100]}')

          path.write_text(source)
          PY

      - name: Commit responsive artwork wiring
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/src/main.tsx
          git commit -m 'feat(web): load project artwork responsively'
          git push origin HEAD:ui/concept-driven-revamp
