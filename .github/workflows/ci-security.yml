name: CI and security gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Repository verification
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Node.js 22.16.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0

      - name: Enable exact pnpm version
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
          test "$(pnpm --version)" = "10.32.0"

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full verification gate
        run: pnpm verify

      - name: Prepare sanitized Compose environment
        shell: bash
        run: |
          set -euo pipefail
          cp .env.example .env
          set -a
          source .env
          set +a
          source scripts/materialize-secrets.sh
          materialize_runtime_secrets "$PWD"

      - name: Validate production Compose model
        run: docker compose -f compose.yaml config --quiet

      - name: Build production images
        run: docker compose -f compose.yaml build

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Review dependency changes
        id: dependency-review
        continue-on-error: true
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: moderate

      - name: Record dependency graph requirement
        if: steps.dependency-review.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::Dependency review is unavailable until the repository dependency graph is enabled. Branch protection documentation records this repository setting as required."

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned Gitleaks
        shell: bash
        env:
          GITLEAKS_VERSION: '8.30.1'
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl --fail --location --silent --show-error --output "$archive" "$base/$archive"
          curl --fail --location --silent --show-error --output checksums.txt "$base/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " $archive$" checksums.txt | sha256sum --check --strict
          tar -xzf "$archive" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan newly introduced commits
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            range="${BEFORE_SHA}..${CURRENT_SHA}"
          else
            range="${CURRENT_SHA}^..${CURRENT_SHA}"
          fi
          gitleaks git --redact --verbose --log-opts="$range" .
