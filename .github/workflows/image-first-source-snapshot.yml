name: Image First Source Snapshot

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  snapshot:
    if: github.head_ref == 'agent/image-first-graphics-overhaul'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Package source
        run: |
          zip -qr /tmp/neon-image-first-source.zip . \
            -x '.git/*' 'node_modules/*' '**/node_modules/*' '**/dist/*'

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: neon-image-first-source
          path: /tmp/neon-image-first-source.zip
          retention-days: 2
