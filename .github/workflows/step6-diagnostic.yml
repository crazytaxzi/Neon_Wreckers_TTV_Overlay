name: Step 6 diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-test:
    if: github.head_ref == 'audit/06-container-secret-hardening'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        file:
          - tools/test/api-routes.test.mjs
          - tools/test/container-hardening.test.mjs
          - tools/test/content-security-policy.test.mjs
          - tools/test/database.test.mjs
          - tools/test/repository.test.mjs
          - tools/test/twitch-eventsub.test.mjs
          - tools/test/ui-graphics.test.mjs
          - tools/test/ui-raster-system.test.mjs
          - tools/test/ui-revamp.test.mjs
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Enable pnpm 10.32.0
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Set up Node.js 22.16.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.file }}
        run: node --test "${{ matrix.file }}"
