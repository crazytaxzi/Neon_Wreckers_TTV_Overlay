name: Step 4 overlay migration

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/overlay/src/network.ts
      - tools/audit/step4-migrate.mjs
      - .github/workflows/audit-step4-migrate.yml

permissions:
  contents: write

concurrency:
  group: step4-overlay-migration
  cancel-in-progress: false

jobs:
  migrate:
    if: ${{ github.head_ref == 'audit/04-adaptive-overlay-realtime' }}
    runs-on: [self-hosted, Linux, X64, neon-wreckers]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: audit/04-adaptive-overlay-realtime
          fetch-depth: 0
      - name: Apply migration
        run: node tools/audit/step4-migrate.mjs
      - name: Commit migrated overlay
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/overlay/src/main.tsx tools/audit/step4-migrate.mjs .github/workflows/audit-step4-migrate.yml
          git commit -m "feat(overlay): make networking realtime-first with fallback polling"
          git push origin HEAD:audit/04-adaptive-overlay-realtime
