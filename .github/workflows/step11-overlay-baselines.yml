name: Step 11 overlay baseline updater

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    if: github.head_ref == 'audit/11-asset-manifest-hardening'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: audit/11-asset-manifest-hardening
          persist-credentials: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
          cache: pnpm
      - name: Enable pnpm 10.32.0
        run: corepack enable && corepack prepare pnpm@10.32.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Build browser surfaces
        run: |
          pnpm --filter @neon-wreckers/ui run build
          pnpm --filter @neon-wreckers/web run build
          pnpm --filter @neon-wreckers/admin run build
          pnpm --filter @neon-wreckers/overlay run build
      - name: Start previews
        run: |
          pnpm --filter @neon-wreckers/web exec vite preview --host 127.0.0.1 --port 4173 > /tmp/web.log 2>&1 &
          pnpm --filter @neon-wreckers/admin exec vite preview --host 127.0.0.1 --port 4174 > /tmp/admin.log 2>&1 &
          pnpm --filter @neon-wreckers/overlay exec vite preview --host 127.0.0.1 --port 4175 > /tmp/overlay.log 2>&1 &
          npx wait-on http://127.0.0.1:4173 http://127.0.0.1:4174/admin/ http://127.0.0.1:4175/overlay/
      - name: Update reviewed overlay baselines
        run: pnpm exec playwright test tests/browser/overlay.spec.ts --project=desktop-chromium --update-snapshots
      - name: Commit baselines and remove updater
        run: |
          git rm .github/workflows/step11-overlay-baselines.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/browser/__snapshots__/overlay.spec.ts-snapshots
          git commit -m "test(browser): update manifest-owned overlay baselines"
          git push origin HEAD:audit/11-asset-manifest-hardening
