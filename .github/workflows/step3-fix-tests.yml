name: Step 3 test alignment

on:
  push:
    branches:
      - audit/03-shared-runtime-contracts

permissions:
  contents: write

jobs:
  fix:
    if: github.repository == 'crazytaxzi/Neon_Wreckers_TTV_Overlay'
    runs-on: [self-hosted, Linux, X64, neon-wreckers]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: audit/03-shared-runtime-contracts
          fetch-depth: 0
      - name: Update assertions and commit
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/test/ui-revamp.test.mjs')
          source = path.read_text()
          source = source.replace(
              "  assert.match(source, /malformed packet must not take down a live stream overlay/i);",
              "  assert.match(source, /realtimeEventSchema\\.safeParse/);\n  assert.match(source, /contract validation failed/i);"
          )
          source = source.replace(
              "  assert.match(source, /visualKey\\?: string/);",
              "  assert.match(source, /currentWreckSchema/);"
          )
          path.write_text(source)
          Path('docs/STEP3_VERIFY_DIAGNOSTIC.md').unlink(missing_ok=True)
          Path('.github/workflows/step3-fix-tests.yml').unlink()
          PY
          git config user.name 'neon-wreckers-audit-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add --all
          git diff --cached --check
          git commit -m 'test(overlay): assert runtime contract safety behavior'
          git push origin HEAD:audit/03-shared-runtime-contracts
