name: UI Source Snapshot

on:
  push:
    branches:
      - ui/concept-driven-revamp
  pull_request:
    paths:
      - '.github/workflows/ui-source-snapshot.yml'
      - 'apps/**'
      - 'packages/**'
      - 'content/**'
      - 'assets/**'
      - 'docs/**'
      - 'tools/**'

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload repository source
        uses: actions/upload-artifact@v4
        with:
          name: neon-wreckers-ui-source
          path: |
            .
            !.git/**
            !node_modules/**
            !**/dist/**
          include-hidden-files: true
          retention-days: 1
