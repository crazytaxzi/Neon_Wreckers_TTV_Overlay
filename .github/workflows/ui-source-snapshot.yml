name: UI source snapshot

on:
  push:
    branches:
      - agent/concept-faithful-ui-rebuild

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Package source
        run: |
          tar --exclude=.git --exclude=node_modules --exclude='**/dist' -czf /tmp/neon-wreckers-ui-source.tar.gz .

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: neon-wreckers-ui-source
          path: /tmp/neon-wreckers-ui-source.tar.gz
          retention-days: 1
