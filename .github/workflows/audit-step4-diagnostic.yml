name: Step 4 overlay diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - apps/overlay/**
      - tools/test/overlay-network.test.ts
      - .github/workflows/audit-step4-diagnostic.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: ${{ github.head_ref == 'audit/04-adaptive-overlay-realtime' }}
    runs-on: [self-hosted, Linux, X64, neon-wreckers]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
          check-latest: false
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.32.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Capture overlay build
        run: |
          set +e
          pnpm --filter @neon-wreckers/overlay build > step4-overlay-build.log 2>&1
          echo $? > step4-overlay-build.exit
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: step4-overlay-build-diagnostic
          path: |
            step4-overlay-build.log
            step4-overlay-build.exit
          retention-days: 3
