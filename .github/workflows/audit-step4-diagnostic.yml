name: Step 4 overlay finalizer

on:
  pull_request:
    branches: [main]
    paths:
      - apps/overlay/src/network.ts
      - .github/workflows/audit-step4-diagnostic.yml

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.head_ref == 'audit/04-adaptive-overlay-realtime' }}
    runs-on: [self-hosted, Linux, X64, neon-wreckers]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: audit/04-adaptive-overlay-realtime
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
          check-latest: false
      - name: Align socket handler signatures
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync, rmSync } from 'node:fs';
          const path = 'apps/overlay/src/network.ts';
          let source = readFileSync(path, 'utf8');
          source = source
            .replace('onopen: (() => void) | null;', 'onopen: ((event: Event) => void) | null;')
            .replace('onclose: (() => void) | null;', 'onclose: ((event: CloseEvent) => void) | null;')
            .replace('onerror: (() => void) | null;', 'onerror: ((event: Event) => void) | null;')
            .replace('onmessage: ((event: { data: unknown }) => void) | null;', 'onmessage: ((event: MessageEvent<unknown>) => void) | null;');
          writeFileSync(path, source);
          rmSync('.github/workflows/audit-step4-diagnostic.yml');
          NODE
      - name: Commit final fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/overlay/src/network.ts .github/workflows/audit-step4-diagnostic.yml
          git commit -m "fix(overlay): align socket abstraction with browser events"
          git push origin HEAD:audit/04-adaptive-overlay-realtime
