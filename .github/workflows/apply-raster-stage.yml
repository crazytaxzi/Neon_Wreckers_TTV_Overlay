name: Install Shared Raster UI

on:
  push:
    branches:
      - agent/image-first-graphics-overhaul

permissions:
  contents: write

concurrency:
  group: install-shared-raster-ui
  cancel-in-progress: false

jobs:
  install-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out raster branch
        uses: actions/checkout@v4
        with:
          ref: agent/image-first-graphics-overhaul
          fetch-depth: 0

      - name: Install verified raster pack
        run: node tools/image-first/apply-stage.mjs

      - name: Remove one-time staging payload
        run: |
          rm -f tools/image-first/apply-stage.mjs
          rm -f tools/image-first/raster-pack.part-*
          rm -f .github/workflows/apply-raster-stage.yml

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify raster contracts
        run: node --test tools/test/ui-raster-system.test.mjs tools/test/ui-revamp.test.mjs

      - name: Build shared UI and all surfaces
        run: |
          pnpm --filter @neon-wreckers/ui run build
          pnpm --filter @neon-wreckers/web run build
          pnpm --filter @neon-wreckers/admin run build
          pnpm --filter @neon-wreckers/overlay run build

      - name: Commit verified raster implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced by the raster installer."
            exit 1
          fi
          git commit -m "feat(ui): install shared generated raster interface"
          git push origin HEAD:agent/image-first-graphics-overhaul
