name: Apply responsive proof fixes

on:
  push:
    branches:
      - agent/concept-faithful-ui-rebuild
    paths:
      - '.github/workflows/apply-responsive-proof-fixes.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out UI branch
        uses: actions/checkout@v4
        with:
          ref: agent/concept-faithful-ui-rebuild
          fetch-depth: 0

      - name: Append reviewed responsive corrections
        shell: bash
        run: |
          set -Eeuo pipefail
          if grep -q 'RESPONSIVE PROOF CORRECTIONS' apps/web/src/styles.css; then
            echo 'Responsive proof corrections already present.'
            exit 0
          fi
          cat >> apps/web/src/styles.css <<'CSS'

          /* ================================================================
             RESPONSIVE PROOF CORRECTIONS
             Keep real device layouts aligned with the approved concept boards.
             ================================================================ */

          .nw-skip-link:not(:focus-visible) {
            width: 1px !important;
            height: 1px !important;
            padding: 0 !important;
            overflow: hidden !important;
            clip-path: inset(50%) !important;
            white-space: nowrap !important;
            transform: none !important;
          }

          @media (min-width: 761px) and (max-width: 1100px) {
            .player-shell .command-center-grid {
              grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
              align-items: stretch;
            }

            .player-shell .command-center-hero {
              grid-column: 1 / -1;
            }

            .player-shell .dashboard-wreck-card,
            .player-shell .dashboard-resources-card {
              grid-column: auto;
              min-width: 0;
            }

            .player-shell .dashboard-resource-list {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .player-shell .dashboard-resource-list > :last-child {
              grid-column: 1 / -1;
            }
          }

          @media (max-width: 760px) {
            .player-shell .nw-app-shell__nav {
              position: fixed;
              z-index: 900;
              inset: auto 0 0;
              top: auto;
              height: auto;
              overflow: visible;
              padding: 0;
              border: 0;
              background: transparent;
              box-shadow: none;
            }

            .player-shell .market-console__tabs {
              display: grid;
              grid-template-columns: repeat(2, minmax(0, 1fr));
              overflow: visible;
            }

            .player-shell .market-console__tabs button {
              flex: none;
              min-width: 0;
              min-height: 3.35rem;
              padding-inline: 0.55rem;
            }
          }
          CSS

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared UI
        run: pnpm --filter @neon-wreckers/ui run build

      - name: Build player app
        run: pnpm --filter @neon-wreckers/web run build

      - name: Run UI contracts
        run: node --test tools/test/ui-revamp.test.mjs

      - name: Commit responsive corrections
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/src/styles.css
          git commit -m 'fix(ui): tighten mobile and tablet concept layouts'
          git push origin HEAD:agent/concept-faithful-ui-rebuild
