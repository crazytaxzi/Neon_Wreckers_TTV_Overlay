name: Apply concept UI rebuild

on:
  push:
    branches:
      - agent/concept-faithful-ui-rebuild
    paths:
      - '.github/workflows/apply-concept-ui.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out UI branch
        uses: actions/checkout@v4
        with:
          ref: agent/concept-faithful-ui-rebuild
          fetch-depth: 0

      - name: Apply reviewed UI source
        shell: bash
        run: |
          cat .github/ui-patch/part-* > /tmp/concept-ui-patch.b64
          base64 --decode /tmp/concept-ui-patch.b64 > /tmp/concept-ui-patch.tar.gz
          tar -xzf /tmp/concept-ui-patch.tar.gz -C .
          git fetch origin main
          git checkout origin/main -- .github/workflows/ui-revamp-verify.yml
          rm -rf .github/ui-patch
          rm -f .github/workflows/ui-source-snapshot.yml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared UI
        run: pnpm --filter @neon-wreckers/ui run build

      - name: Build player app
        run: pnpm --filter @neon-wreckers/web run build

      - name: Run UI contracts
        run: node --test tools/test/ui-revamp.test.mjs

      - name: Commit UI rebuild
        shell: bash
        run: |
          rm -f .github/workflows/apply-concept-ui.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/index.html apps/admin/index.html apps/web/src/app.tsx apps/web/src/components/PlayerHeader.tsx apps/web/src/pages/station.tsx apps/web/src/styles.css packages/ui/src/components.tsx .github/workflows/ui-revamp-verify.yml
          git add -u .github
          git commit -m 'feat(ui): rebuild player shell and command surfaces'
          git push origin HEAD:agent/concept-faithful-ui-rebuild
