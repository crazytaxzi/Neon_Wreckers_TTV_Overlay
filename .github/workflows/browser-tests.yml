name: Browser integration tests

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'apps/overlay/**'
      - 'packages/ui/**'
      - 'packages/browser-client/**'
      - 'packages/contracts/**'
      - 'tests/browser/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/browser-tests.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'apps/overlay/**'
      - 'packages/ui/**'
      - 'packages/browser-client/**'
      - 'packages/contracts/**'
      - 'tests/browser/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/browser-tests.yml'

concurrency:
  group: browser-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  playwright:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
      - name: Enable pnpm 10.32.0
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Build browser surfaces
        run: |
          pnpm --filter @neon-wreckers/ui run build
          pnpm --filter @neon-wreckers/web run build
          pnpm --filter @neon-wreckers/admin run build
          pnpm --filter @neon-wreckers/overlay run build
      - name: Start built previews
        run: |
          nohup pnpm --filter @neon-wreckers/web exec vite preview --host 127.0.0.1 --port 4173 > /tmp/web-preview.log 2>&1 &
          nohup pnpm --filter @neon-wreckers/admin exec vite preview --host 127.0.0.1 --port 4174 > /tmp/admin-preview.log 2>&1 &
          nohup pnpm --filter @neon-wreckers/overlay exec vite preview --host 127.0.0.1 --port 4175 > /tmp/overlay-preview.log 2>&1 &
          for url in http://127.0.0.1:4173/ http://127.0.0.1:4174/admin/ http://127.0.0.1:4175/overlay/?preview=1; do
            ready=0
            for attempt in $(seq 1 40); do
              if curl --fail --silent "$url" >/dev/null; then ready=1; break; fi
              sleep 1
            done
            if [ "$ready" -ne 1 ]; then cat /tmp/*-preview.log; exit 1; fi
          done
      - name: Run browser suite
        env:
          NW_BROWSER_BASE_URL: http://127.0.0.1:4173
          NW_ADMIN_BASE_URL: http://127.0.0.1:4174/admin/
          NW_OVERLAY_BASE_URL: http://127.0.0.1:4175/overlay/?preview=1
        run: |
          if [ "$GITHUB_HEAD_REF" = "ui/generated-art-cohesive-pass" ]; then
            pnpm test:browser:update
          else
            pnpm test:browser
          fi
      - name: Commit reviewed generated-art baselines
        if: github.head_ref == 'ui/generated-art-cohesive-pass'
        run: |
          git add tests/browser/__snapshots__
          if git diff --cached --quiet; then
            echo 'Visual baselines are already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore(test): refresh generated-art snapshots'
          git push origin HEAD:ui/generated-art-cohesive-pass
      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results/playwright
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload preview logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: browser-preview-logs
          path: /tmp/*-preview.log
          retention-days: 14
          if-no-files-found: ignore
