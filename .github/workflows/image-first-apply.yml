name: Apply Image First Graphics Stage

on:
  push:
    branches: [agent/image-first-graphics-overhaul]

permissions:
  contents: write

concurrency:
  group: image-first-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out graphics branch
        uses: actions/checkout@v4
        with:
          ref: agent/image-first-graphics-overhaul
          fetch-depth: 0

      - name: Detect staged graphics payload
        id: staged
        run: |
          if [ -f tools/image-first/apply-stage.mjs ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply reviewed graphics stage
        if: steps.staged.outputs.present == 'true'
        run: node tools/image-first/apply-stage.mjs

      - name: Remove staging payload
        if: steps.staged.outputs.present == 'true'
        run: rm -f tools/image-first/apply-stage.mjs tools/image-first/raster-pack.part-*

      - name: Enable pnpm
        if: steps.staged.outputs.present == 'true'
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Install dependencies
        if: steps.staged.outputs.present == 'true'
        run: pnpm install --frozen-lockfile

      - name: Verify synchronized frontends
        if: steps.staged.outputs.present == 'true'
        run: |
          node --test tools/test/ui-revamp.test.mjs tools/test/ui-graphics.test.mjs
          pnpm --filter @neon-wreckers/ui run build
          pnpm --filter @neon-wreckers/web run build
          pnpm --filter @neon-wreckers/admin run build
          pnpm --filter @neon-wreckers/overlay run build

      - name: Commit verified graphics stage
        if: steps.staged.outputs.present == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/ui tools/test/ui-graphics.test.mjs tools/image-first
          git commit -m "feat(ui): add shared raster concept chrome"
          git push origin HEAD:agent/image-first-graphics-overhaul
