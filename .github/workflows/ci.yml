name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Enable pnpm 10.32.0
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
          test "$(pnpm --version)" = "10.32.0"

      - name: Set up Node.js 22.16.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository verification
        run: pnpm verify

  step12-docs-patch:
    if: github.event_name == 'pull_request' && github.head_ref == 'audit/12-docs-license-consistency'
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: audit/12-docs-license-consistency
          fetch-depth: 0
          persist-credentials: true
      - name: Apply neutral documentation patch and remove scaffolding
        run: |
          set -euo pipefail
          python tools/step12-docs-patch.py
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git rm --ignore-unmatch .github/workflows/step12-docs-patch.yml .github/workflows/step12-docs-implementation.yml tools/step12-docs-patch.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md LICENSE_STATUS.md SECURITY.md docs/TEST_REPORT.md docs/DEPLOYMENT_VERIFICATION.md docs/VERIFICATION_BOUNDARIES.md docs/RELEASE_EVIDENCE_TEMPLATE.md tools/test/docs-consistency.test.mjs .github/workflows/ci.yml
          git commit -m "docs(release): align visibility security and evidence claims"
          git push origin HEAD:audit/12-docs-license-consistency
