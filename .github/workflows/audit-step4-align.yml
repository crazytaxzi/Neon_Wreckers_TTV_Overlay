name: Step 4 overlay alignment

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/audit/step4-align.mjs
      - .github/workflows/audit-step4-align.yml

permissions:
  contents: write

concurrency:
  group: step4-overlay-alignment
  cancel-in-progress: false

jobs:
  align:
    if: ${{ github.head_ref == 'audit/04-adaptive-overlay-realtime' }}
    runs-on: [self-hosted, Linux, X64, neon-wreckers]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: audit/04-adaptive-overlay-realtime
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
          check-latest: false
      - name: Apply alignment
        run: node tools/audit/step4-align.mjs
      - name: Commit aligned overlay
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/overlay/src/main.tsx apps/overlay/src/overlay.css tools/test/ui-revamp.test.mjs tools/audit/step4-align.mjs .github/workflows/audit-step4-align.yml
          git commit -m "test(overlay): align adaptive networking safety contracts"
          git push origin HEAD:audit/04-adaptive-overlay-realtime
