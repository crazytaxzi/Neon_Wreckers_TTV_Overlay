name: Step 10 lockfile generator

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    if: github.head_ref == 'audit/10-browser-integration-tests'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: audit/10-browser-integration-tests
          persist-credentials: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.16.0
      - name: Enable pnpm 10.32.0
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
      - name: Commit exact browser dependencies and remove generator
        run: |
          pnpm add -Dw @playwright/test@1.55.0 @axe-core/playwright@4.10.2
          git rm .github/workflows/step10-lockfile.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json pnpm-lock.yaml
          git commit -m "chore(test): pin browser test dependencies"
          git push origin HEAD:audit/10-browser-integration-tests
