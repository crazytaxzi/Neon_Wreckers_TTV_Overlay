<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Rustlight Tug</title>
  <desc id="desc">A compact industrial salvage tug with a green cockpit, orange hazard markings, grapple arms, and purple ion thrusters.</desc>
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060d1d"/>
      <stop offset="0.52" stop-color="#101228"/>
      <stop offset="1" stop-color="#02070c"/>
    </linearGradient>
    <radialGradient id="nebula" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#7c2bff" stop-opacity=".18"/>
      <stop offset=".48" stop-color="#52ff24" stop-opacity=".07"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#354149"/>
      <stop offset=".55" stop-color="#202b32"/>
      <stop offset="1" stop-color="#121a20"/>
    </linearGradient>
    <linearGradient id="cockpit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19a75f"/>
      <stop offset=".52" stop-color="#47ff62"/>
      <stop offset="1" stop-color="#087e51"/>
    </linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#bb4dff" stop-opacity="0"/>
      <stop offset=".38" stop-color="#bb4dff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#7e20ff" stop-opacity=".95"/>
    </linearGradient>
    <filter id="greenGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="purpleGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#7a43ff" stroke-opacity=".13" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#space)"/>
  <rect width="1200" height="675" fill="url(#nebula)"/>
